<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment confirmed — SwiftCiv</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
    <style>
      html,
      body {
        overflow: auto;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: var(--bg);
      }
    </style>
  </head>
  <body>
    <div
      style="
        text-align: center;
        max-width: 400px;
        padding: 40px 24px;
        font-family: &quot;Inter&quot;, sans-serif;
      "
    >
      <div style="margin: 0 auto 28px; width: 52px; height: 52px">
        <img
          src="{{ url_for('static', filename='images/swiftciv-logo.png') }}"
          width="52"
          height="52"
          alt="SwiftCiv"
          style="display: block"
        />
      </div>

      <h1
        style="
          font-size: 22px;
          font-weight: 600;
          color: #111;
          margin-bottom: 12px;
        "
      >
        Payment confirmed.
      </h1>

      <p
        style="
          color: #555;
          font-size: 15px;
          line-height: 1.75;
          margin-bottom: 28px;
        "
      >
        We've sent a magic link to your email.<br />
        Click it to access SwiftCiv instantly —<br />no password needed.
      </p>

      <div
        style="
          background: #f3f2ef;
          border-radius: 10px;
          padding: 16px 20px;
          margin-bottom: 24px;
        "
      >
        <p style="color: #888; font-size: 13px; line-height: 1.65; margin: 0">
          Can't find it? Check your spam folder.<br />
          The link expires in 15 minutes.
        </p>
      </div>

      <p style="color: #aaa; font-size: 12px">
        Already have an account?
        <a
          href="/login"
          style="
            color: #555;
            text-decoration: underline;
            text-underline-offset: 2px;
          "
          >Sign in</a
        >
      </p>
    </div>
  </body>
</html>
